# PPO with discrete action space (angle bins at 0.5 degree steps)

algo: ppo
action_mode: discrete
env: PeggleSimDiscrete-v0

level: null
stage: null

total_timesteps: 1_000_000
save_freq: 100_000
eval_freq: 50_000
eval_episodes: 20
seed: 42
verbose: 1

save_dir: checkpoints
log_dir: logs

hyperparams:
  learning_rate: 0.00025
  n_steps: 1024
  batch_size: 128
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.02
