# TD3 with continuous action space
# Twin Delayed DDPG - another off-policy continuous option

algo: td3
action_mode: continuous
env: PeggleSim-v0

level: null
stage: null

total_timesteps: 500_000
save_freq: 50_000
eval_freq: 25_000
eval_episodes: 20
seed: 42
verbose: 1

save_dir: checkpoints
log_dir: logs

hyperparams:
  learning_rate: 0.001
  buffer_size: 100_000
  batch_size: 256
  gamma: 0.99
  tau: 0.005
  learning_starts: 1000
